<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Made with love...and some other shit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Grotesk:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;
  --surface:#181818;
  --surface2:#222222;
  --border:#2A2A2A;
  --text:#F0F0F0;
  --muted:#888;
  --radius:12px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,13,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:12px 24px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.nav-title{
  font-family:'Dancing Script',cursive;font-size:1.25rem;
  background:linear-gradient(90deg,#FF5733,#BF5FFF,#00C2E0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;flex-shrink:0;font-weight:700;
}
.search-wrap{flex:1;min-width:200px;max-width:420px;position:relative}
.search-wrap input{
  width:100%;padding:9px 14px 9px 38px;
  border:1.5px solid var(--border);border-radius:50px;
  background:var(--surface);color:var(--text);
  font-size:.88rem;font-family:'Space Grotesk',sans-serif;
  outline:none;transition:border-color .2s;
}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:#BF5FFF}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.8rem}

/* HERO */
.hero{
  background:#000;
  border-bottom:1px solid var(--border);
  text-align:center;padding:72px 24px 56px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(191,95,255,.18) 0%, transparent 70%),
             radial-gradient(ellipse 60% 40% at 10% 100%, rgba(255,87,51,.12) 0%, transparent 60%),
             radial-gradient(ellipse 50% 40% at 90% 100%, rgba(0,194,224,.1) 0%, transparent 60%);
}
.hero-inner{position:relative;z-index:1}
.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,5vw,4rem);
  font-weight:900;line-height:1.1;margin-bottom:10px;color:#fff;
}
.hero h1 em{
  font-style:italic;
  background:linear-gradient(90deg,#FF5733 0%,#F72585 50%,#BF5FFF 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{color:var(--muted);font-size:.95rem;margin-bottom:32px;letter-spacing:.02em}
.hero-stats{
  display:inline-flex;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;
}
.hero-stat{padding:12px 24px;font-size:.82rem;color:var(--muted);border-right:1px solid var(--border)}
.hero-stat:last-child{border-right:none}
.hero-stat b{display:block;font-size:1.5rem;font-weight:700;color:#fff;line-height:1.1;margin-bottom:2px}

/* FILTERS */
.filter-bar{
  padding:16px 24px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  border-bottom:1px solid var(--border);
}
.filter-btn{
  padding:8px 18px;border-radius:50px;
  border:1.5px solid var(--border);
  background:transparent;color:var(--muted);
  font-size:.8rem;font-weight:600;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
  transition:all .15s;white-space:nowrap;
  margin-bottom:16px;letter-spacing:.02em;
}
.filter-btn:hover{border-color:#555;color:var(--text)}
.filter-btn.active{color:#000;border-color:transparent}
.filter-btn[data-cat="all"].active{background:#F0F0F0;color:#000}
.filter-btn[data-cat="mains"].active{background:#FF5733}
.filter-btn[data-cat="soups"].active{background:#00C2E0}
.filter-btn[data-cat="pasta"].active{background:#BF5FFF}
.filter-btn[data-cat="mealprep"].active{background:#00D97E}
.filter-btn[data-cat="sides"].active{background:#A3E635}
.filter-btn[data-cat="snacks"].active{background:#FFBA08}
.filter-btn[data-cat="baking"].active{background:#F72585}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;padding:24px 24px 60px;
}
.no-results{padding:80px 24px;text-align:center;color:var(--muted);font-size:1.1rem;display:none}

/* CARD */
.card{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);
  overflow:hidden;cursor:pointer;
  transition:transform .18s,box-shadow .18s,border-color .18s;
  display:flex;flex-direction:column;
  position:relative;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,.6);
  border-color:#444;
}

/* Card accent bar */
.card-accent-bar{height:3px;width:100%;flex-shrink:0}

/* Card header — fixed height, emoji top, name bottom */
.card-header{
  height:150px;
  padding:18px 20px 16px;
  position:relative;overflow:hidden;
  flex-shrink:0;
  display:flex;flex-direction:column;justify-content:space-between;
}
.card-header-emoji{font-size:1.8rem;line-height:1}
.card-header-name{
  font-family:'Playfair Display',serif;
  font-size:1rem;font-weight:700;
  line-height:1.3;color:#fff;
  /* clamp to 3 lines max */
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}

/* Card body */
.card-body{padding:12px 16px 16px;flex:1;display:flex;flex-direction:column;gap:5px}
.card-cat{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:50px;
  font-size:.68rem;font-weight:700;color:#000;
  letter-spacing:.5px;text-transform:uppercase;width:fit-content;
}
.card-sub{font-size:.75rem;color:var(--muted);font-style:italic}
.card-meta{font-size:.72rem;color:#555;margin-top:auto;padding-top:6px}
.card-has-photo{font-size:.68rem;color:#555;margin-top:4px;letter-spacing:.02em}

/* Category colours */
.cc-mains{background:#FF5733}
.cc-soups{background:#00C2E0}
.cc-pasta{background:#BF5FFF}
.cc-mealprep{background:#00D97E}
.cc-sides{background:#A3E635}
.cc-snacks{background:#FFBA08}
.cc-baking{background:#F72585}

/* Category gradient backgrounds for card headers */
.nb-mains{background:linear-gradient(135deg,rgba(255,87,51,.30) 0%,rgba(255,87,51,.06) 100%)}
.nb-soups{background:linear-gradient(135deg,rgba(0,194,224,.30) 0%,rgba(0,194,224,.06) 100%)}
.nb-pasta{background:linear-gradient(135deg,rgba(191,95,255,.30) 0%,rgba(191,95,255,.06) 100%)}
.nb-mealprep{background:linear-gradient(135deg,rgba(0,217,126,.30) 0%,rgba(0,217,126,.06) 100%)}
.nb-sides{background:linear-gradient(135deg,rgba(163,230,53,.30) 0%,rgba(163,230,53,.06) 100%)}
.nb-snacks{background:linear-gradient(135deg,rgba(255,186,8,.30) 0%,rgba(255,186,8,.06) 100%)}
.nb-baking{background:linear-gradient(135deg,rgba(247,37,133,.30) 0%,rgba(247,37,133,.06) 100%)}

/* MODAL */
.overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
  align-items:flex-start;justify-content:center;
  padding:24px 16px;overflow-y:auto;
}
.overlay.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;width:100%;max-width:800px;
  margin:auto;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.8);
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-photo{width:100%;max-height:320px;object-fit:cover;display:block}
.modal-accent-bar{height:4px;width:100%}
.modal-header{padding:22px 28px 18px;border-bottom:1px solid var(--border)}
.modal-for{font-family:'Dancing Script',cursive;font-size:.95rem;color:var(--muted);display:block;margin-bottom:4px}
.modal-name{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;line-height:1.2;color:var(--text)}
.modal-sub{font-style:italic;color:var(--muted);font-size:.9rem;margin-top:6px}
.modal-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:.8rem;color:var(--muted);align-items:center}
.modal-meta a{text-decoration:none;font-weight:600;transition:opacity .15s}
.modal-meta a:hover{opacity:.75}
.modal-body{padding:24px 28px 28px;display:grid;grid-template-columns:1fr 1fr;gap:32px}
.modal-section h3{
  font-family:'Dancing Script',cursive;font-size:1.35rem;font-weight:700;
  margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--text);
}
.ing-group-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:12px 0 6px}
.ing-group-label:first-child{margin-top:0}
.ing-list{list-style:none;font-size:.87rem;line-height:1}
.ing-list li{padding:7px 0;border-bottom:1px solid var(--border);color:#DDD;display:flex;align-items:baseline;gap:8px}
.ing-list li:last-child{border:none}
.dir-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.dir-list li{display:flex;gap:12px;align-items:flex-start;font-size:.87rem;line-height:1.6;color:#DDD}
.step-n{
  min-width:24px;height:24px;border-radius:6px;
  font-size:.7rem;font-weight:700;color:#000;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.modal-notes{
  margin:0 28px 28px;padding:14px 18px;
  background:rgba(255,255,255,.04);
  border-left:3px solid #555;border-radius:4px;
  font-size:.82rem;font-style:italic;color:var(--muted);
}
.close-btn{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,.1);color:var(--text);border:none;
  width:32px;height:32px;border-radius:50%;font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;z-index:10;
}
.close-btn:hover{background:rgba(255,255,255,.2)}
.modal-wrap{position:relative;width:100%;max-width:800px;margin:auto}

@media(max-width:580px){
  .modal-body{grid-template-columns:1fr}
  .modal-header,.modal-body{padding:18px}
  .modal-notes{margin:0 18px 18px}
  .hero{padding:48px 16px 40px}
  nav{padding:10px 16px}
  .grid{padding:16px 12px 50px;gap:12px}
  .filter-bar{padding:14px 12px 0}
}
</style>
</head>

    ingredients:[{label:`Chicken Marinade`,items:[`🍗 ~14 oz chicken breast, diced into equal cubes`, `🧂 1 tsp salt + 1 tsp black pepper`, `🌿 1½ tbsp dried oregano`, `🥛 3 tbsp low fat Greek yoghurt`, `🧄 1 tsp minced garlic`, `🍋 2 tbsp lemon juice`]},{label:`Tzatziki`,items:[`🥛 ⅔ cup low fat Greek yoghurt`, `🧄 1 tsp minced garlic`, `🍋 Juice of ½ lemon`, `🥒 Cucumber, grated + drained`, `🌿 Fresh dill, finely cut`, `🧂 Salt + pepper`]},{label:`2-Ingredient Pita (makes 2)`,items:[`🍞 1 cup all-purpose flour (protein flour preferred)`, `🥛 ½ cup low fat Greek yoghurt`, `🧂 1½ tsp baking powder + pinch of salt`]},{label:`Fillings (per pita)`,items:[`🧅 ¼ cup sliced red onion`, `🫒 2 tbsp black olives`, `🍅 4 cherry tomatoes`, `🧀 1 tbsp reduced fat feta`, `🌿 Fresh parsley`]}],
    directions:[`Toss chicken with all marinade ingredients. Marinate at least 30 min (overnight is better).`, `Make tzatziki: grate + squeeze out cucumber. Mix with yoghurt, garlic, lemon, dill, salt + pepper. Refrigerate.`, `Mix pita dough: flour, yoghurt, baking powder, salt until soft. Divide into 2, roll out thin.`, `Cook pitas in a dry pan over medium-high heat 2–3 min per side until puffed + golden.`, `Cook marinated chicken in a hot pan or grill until cooked through and slightly charred.`, `Assemble: tzatziki on pita, top with chicken, onion, olives, tomatoes, feta, and parsley.`],
    notes:`598 cal · 79g protein each. Marinating overnight makes a huge difference!`

    ingredients:[{label:`Ingredients`,items:[`🥩 2 lbs. Beef Chuck Roast, cubed 1¼ inch`, `🫒 1-2 tablespoons olive oil`, `🧅 1 large onion, roughly sliced`, `🥕 3 medium carrots, chopped`, `🌿 3 ribs celery, chopped`, `🧄 6 garlic cloves, minced`, `🍃 2 bay leaves`, `🌿 1 teaspoon dried thyme`, `🍅 2 tablespoons tomato paste`, `🥣 5 cups unsalted chicken stock or beef stock`, `🧂 ¼ teaspoon fine salt`, `🥢 1 tablespoon regular soy sauce`, `🐟 1 tablespoon fish sauce`, `🌾 ¾ cup pearl barley`, `🧂 Kosher salt and ground black pepper to taste`]}],
    directions:[`Heat Instant Pot on "Sauté More". Pat dry chuck roast, season with salt and pepper. Brown in oil for 8 minutes per side. Remove and set aside.`, `Add onions, sauté 4 minutes. Add carrots and celery, sauté 3 minutes. Set aside ⅓ of vegetables.`, `Add garlic, bay leaves, thyme, and tomato paste. Sauté 2 minutes.`, `Pour in 1 cup stock. Scrub bottom of pot with wooden spoon.`, `Turn off pot. Add salt, soy sauce, and fish sauce. Cut beef into 1¼ inch cubes. Add beef, remaining 4 cups stock, and barley.`, `Close lid, set to Sealing. Pressure Cook High 20 minutes, Natural Release 20 minutes. Open carefully.`, `Add set-aside vegetables. Press "Sauté" and simmer until vegetables are done.`, `Remove bay leaves. Season with salt. Garnish with parsley and serve.`],

  {
    name:`Instant Pot Best Blue Ribbon Chili`,
    subtitle:``,
    serves:``,
    source:``,
    category:`soups`,
    photo:null,
    ingredients:[{label:`Ingredients`,items:[`🍗 1.5 lbs of ground beef (or ground turkey or ground chicken)`, `🫒 1 tbsp of vegetable oil`, `🧈 2 tbsp (1/4 stick) of salted butter`, `🧅 1 medium yellow onion, finely diced`, `🫑 1-2 poblano peppers, finely diced with seeds removed (this is a mild pepper and if you can’t find one, you can use a green bell pepper)`, `🫑 1 small jalapeño pepper, finely diced with seeds removed (optional as this is a medium hot pepper)`, `🫑 1 small habanero pepper, sliced in half with seeds removed`, `🧄 1 tbsp of crushed garlic`, `✨ 1/2 cup of beer`, `🍅 8 oz can of tomato sauce`, `🍅 14.5 oz can of diced tomatoes`, `🥫 10 oz can of Rotel`, `🫙 1 tbsp of hoisin sauce`, `✨ 1/4 cup of taco sauce`, `🫙 1 tsp of Worcestershire sauce`, `🧂 1/2 tsp of kosher salt`, `🧂 1 tsp of Italian seasoning`, `🌿 1 tsp of dried cilantro`, `🧂 2 tbsp of cumin`, `🌶️ 1/2 tbsp of chili powder`, `🧂 1 tsp of seasoned salt`, `🧂 1 tsp of celery salt`, `🧂 1 tsp of Tony Chachere’s Creole Seasoning (optional)`, `✨ Two 15.5 oz cans of red kidney beans, drained & rinsed`, `🌶️ 4 tbsp of Chili Better Than Bouillon`]}],
    directions:[`1. Add the butter and vegetable oil to the Instant Pot and hit “Sauté” on the “More” or “High” setting. Once the butter’s melted and the oil’s sizzling, add in the onions, poblano, jalapeño and habanero peppers and stir & set for 5 minutes until softened and then add in the garlic and cook for another minute. Remove only the habanero pepper when done and discard`, `2. Next, add the ground beef and stir until it cooks down and crumbles and becomes a slightly browned in color (about 3 minutes`, `– it doesn’t need to be fully cooked yet). Its juices will be released while cooking and this is a good thing – keep them in the pot and do not drain`, `3. Add in the beer, diced tomatoes, Rotel, tomato sauce, taco sauce, Worcestershire sauce and hoisin sauce. Stir well and deglaze (scrape) the bottom of the pot`, `4. Now, add the kosher salt, Italian seasoning, cumin, chili powder, dried cilantro, seasoned salt, celery salt and Tony’s Creole seasoning (if using). Stir again until well combined`, `5. Lastly, add the drained and rinsed kidney beans but DO NOT stir them in with the rest. Just lightly smooth them out as they rest on the top of the chili`, `6. Secure the lid and select Manua High Pressure for 5 minutes When done, do a quick release and allow the pot to stay on the “Keep Warm” setting`, `7. When the lid comes off, give everything a good stir, add in the Chili Better Than Bouillon and stir again. Allow it to cool down to a warmish-hot, but not scalding temperature`, `8. Ladle into bowls and top with some optional shredded cheese, sour cream`, `9.Enjoy!`],
    notes:``

    directions:[`⏲️ Heat Instant Pot on "Sauté More". Season ground beef with salt and pepper. Add olive oil and brown beef for 5-7 minutes. Remove beef juice at 5-minute mark and reserve. Continue browning until slightly crisped.`, `⏲️ While beef browns, mix chicken stock, fish sauce, soy sauce, and cocoa powder in a measuring cup.`, `⏲️ Add onions, garlic, cumin, chili powder, and oregano to pot. Sauté 5 minutes until fragrant.`, `⏲️ Pour in ½ cup stock mixture. Scrub bottom of pot with wooden spoon to deglaze.`, `⏲️ Add reserved beef juice, remaining stock mixture, and kidney beans. Mix well. Add tomato paste and crushed tomatoes on top. Do not mix.`, `⏲️ Close lid, set to Sealing. Pressure Cook High 10 minutes, Natural Release. Open carefully.`, `⏲️ If too runny, simmer on Sauté mode. Season with brown sugar, salt, and pepper. Add apple cider vinegar if desired.`, `⏲️ Garnish and serve.`, `📝 Adjust chili powder amount for kids - use 1 tbsp or less depending on spiciness and spicy-tolerance.`],

const CAT_LABELS = {
  mains:'🍽 Mains', soups:'🍲 Soups & Stews', pasta:'🍝 Pasta',
  mealprep:'📦 Meal Prep', sides:'🥗 Sides', snacks:'🧀 Snacks & Dips', baking:'🍪 Baking & Sweets'
};
const CAT_EMOJI = {
  mains:'🍽', soups:'🍲', pasta:'🍝', mealprep:'📦', sides:'🥗', snacks:'🧀', baking:'🍪'
};
const CAT_COLORS = {
  mains:'#FF5733', soups:'#00C2E0', pasta:'#BF5FFF',
  mealprep:'#00D97E', sides:'#A3E635', snacks:'#FFBA08', baking:'#F72585'
};

let activeFilter = 'all';
let searchQuery = '';

function renderGrid() {
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');
  const q = searchQuery.toLowerCase();

  const filtered = RECIPES.filter(r => {
    const matchCat = activeFilter === 'all' || r.category === activeFilter;
    const matchSearch = !q || r.name.toLowerCase().includes(q) ||
      r.subtitle.toLowerCase().includes(q) ||
      r.ingredients.some(g => g.items.some(i => i.toLowerCase().includes(q)));
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  grid.innerHTML = filtered.map(r => {
    const idx = RECIPES.indexOf(r);
    const emoji = CAT_EMOJI[r.category] || '🍴';
    const sub = r.subtitle ? `<div class="card-sub">${r.subtitle}</div>` : '';
    const meta = r.serves ? `<div class="card-meta">Serves ${r.serves}</div>` : '';
    const photoIndicator = r.photo ? `<div class="card-has-photo">📷 Photo</div>` : '';

    return `<div class="card" onclick="openModal(${idx})">
      <div class="card-accent-bar cc-${r.category}"></div>
      <div class="card-header nb-${r.category}">
        <span class="card-header-emoji">${emoji}</span>
        <div class="card-header-name">${r.name}</div>
      </div>
      <div class="card-body">
        <span class="card-cat cc-${r.category}">${CAT_LABELS[r.category]||r.category}</span>
        ${sub}${meta}${photoIndicator}
      </div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const r = RECIPES[idx];
  const overlay = document.getElementById('overlay');
  const modal = document.getElementById('modal');
  const color = CAT_COLORS[r.category] || '#888';

  const photoHtml = r.photo ? `<img class="modal-photo" src="${r.photo}" alt="${r.name}"/>` : '';
  const sourceHtml = r.source
    ? `<a href="${r.source}" target="_blank" style="color:${color}">View original ↗</a>`
    : '';
  const servesHtml = r.serves ? `<span>Serves ${r.serves}</span>` : '';
  const notesHtml = r.notes ? `<div class="modal-notes">💡 ${r.notes}</div>` : '';

  const ingHtml = r.ingredients.map(g => {
    const labelHtml = r.ingredients.length > 1 ? `<div class="ing-group-label">${g.label}</div>` : '';
    const items = g.items.map(i => `<li>${i}</li>`).join('');
    return labelHtml + `<ul class="ing-list">${items}</ul>`;
  }).join('');

  const dirHtml = r.directions.map((d, i) =>
    `<li><span class="step-n cc-${r.category}">${i+1}</span><span>${d}</span></li>`
  ).join('');

  modal.innerHTML = `
    ${photoHtml}
    <div class="modal-accent-bar cc-${r.category}"></div>
    <div class="modal-header">
      <span class="modal-for">A recipe for:</span>
      <div class="modal-name">${r.name}</div>
      ${r.subtitle ? `<div class="modal-sub">${r.subtitle}</div>` : ''}
      <div class="modal-meta">${servesHtml}${sourceHtml}</div>
    </div>
    <div class="modal-body">
      <div class="modal-section"><h3>Ingredients</h3>${ingHtml}</div>
      <div class="modal-section"><h3>Directions</h3><ol class="dir-list">${dirHtml}</ol></div>
    </div>
    ${notesHtml}
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeOverlay(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    renderGrid();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

renderGrid();
</script>
